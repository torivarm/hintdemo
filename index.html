<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraIT.sec — Hint-system</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f6f3;--surface:#fff;--border:#e0ddd6;--text:#1a1a18;--muted:#6b6a65;--faint:#9b9a94;--accent:#1a56a0;--accent-bg:#e8f0fb;--warn:#7a4200;--warn-bg:#fdf3e3;--warn-bd:#d4940a;--code:#f0efe8;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#141412;--surface:#1e1e1c;--border:#2e2e2a;--text:#e8e6e0;--muted:#9b9a94;--faint:#6b6a65;--accent:#6ba3e8;--accent-bg:#1a2a40;--warn:#e8a840;--warn-bg:#2a1e08;--warn-bd:#7a4200;--code:#2a2926}}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:15px;font-weight:600}.logo em{font-weight:400;font-style:normal;color:var(--muted)}
#hdr-user{font-size:13px;color:var(--muted)}
main{max-width:680px;margin:0 auto;padding:32px 20px}
.view{display:none}.view.active{display:block}
.box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;max-width:400px}
.box h2{font-size:18px;margin-bottom:4px}.box p{font-size:13px;color:var(--muted);margin-bottom:20px}
.flabel{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.finput{display:block;width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);font-size:15px;font-family:inherit;margin-bottom:14px}
.finput:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,160,.15)}
.brow{display:flex;gap:8px}
button{padding:9px 18px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;cursor:pointer;transition:background .12s}
button:hover{background:var(--bg)}
button.p{background:var(--accent);color:#fff;border-color:var(--accent);flex:1}
button.p:hover{opacity:.88}
.err{font-size:12px;color:#b02020;margin-top:8px;min-height:16px}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.ph h2{font-size:19px}.ph small{display:block;font-size:13px;color:var(--muted);margin-top:2px}
.prog{height:4px;background:var(--border);border-radius:2px;margin-bottom:8px;overflow:hidden}
.prog-f{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.prog-lbl{font-size:12px;color:var(--faint);margin-bottom:24px}
.clbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin:24px 0 8px}
.hcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.hhdr{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.hhdr:hover{background:rgba(0,0,0,.03)}
.hnum{font-size:12px;color:var(--faint);min-width:18px;font-weight:600}
.htit{flex:1;font-size:14px;font-weight:500}.htit.used{color:var(--muted);font-weight:400}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bnew{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}
.bdone{background:var(--bg);color:var(--faint);border:1px solid var(--border)}
.hbody{padding:0 16px 16px;display:none}
.explain{font-size:13px;color:var(--muted);background:var(--bg);border-radius:var(--rs);padding:12px 14px;line-height:1.7;margin-bottom:12px;white-space:pre-line}
.sep{border:none;border-top:1px solid var(--border);margin:12px 0}
.slbl{font-size:12px;color:var(--muted);margin-bottom:8px}
.cbox{font-size:13px;background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:var(--rs);padding:12px 14px;margin-bottom:10px}
.cbox p{color:var(--muted);margin-bottom:10px;line-height:1.6}
.bwarn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-bd)}
.bwarn:hover{background:var(--warn-bd);color:#fff}
.sbox{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.shdr{display:flex;justify-content:space-between;align-items:center;background:var(--code);padding:7px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em}
.cpbtn{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer}
.cpbtn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
pre{background:var(--code);padding:14px;font-size:12px;font-family:"Courier New",monospace;white-space:pre-wrap;word-break:break-word;color:var(--text);line-height:1.65}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.slbl2{font-size:12px;color:var(--muted);margin-bottom:3px}.sval{font-size:24px;font-weight:700}
.tabs{display:flex;gap:4px;margin-bottom:14px}
.tab{font-size:13px;padding:6px 14px;border-radius:var(--rs);border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted)}
.tab.on{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.tbl{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.trow{display:grid;grid-template-columns:90px 60px repeat(8,1fr);align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;gap:4px}
.trow:last-child{border-bottom:none}
.trow.th{background:var(--bg);font-size:11px;color:var(--muted);font-weight:600}
.dot{width:12px;height:12px;border-radius:50%;display:block;margin:auto}
.don{background:var(--warn)}.doff{background:var(--border);border:1px solid var(--faint)}
.lrow{display:flex;justify-content:space-between;align-items:baseline;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px}
.lrow:last-child{border-bottom:none}
.ltime{font-size:12px;color:var(--faint);white-space:nowrap;margin-left:12px}
.empty{font-size:13px;color:var(--muted);padding:12px 0}
.foot{font-size:12px;color:var(--faint);text-align:center;margin-top:24px}
</style>
</head>
<body>
<header>
  <span class="logo">InfraIT.sec <em>/ hint-system</em></span>
  <span id="hdr-user"></span>
</header>
<main>
<div id="v-login" class="view active">
  <div class="box">
    <h2>Hint-system</h2>
    <p>Logg inn med ditt prefiks. Infrastrukturen inneholder 8 sikkerhetsmessige svakheter.</p>
    <label class="flabel" for="f-prefix">Ditt prefiks (f.eks. on03)</label>
    <input class="finput" type="text" id="f-prefix" placeholder="on03" autocomplete="off" spellcheck="false">
    <div class="brow">
      <button class="p" id="btn-student">Logg inn som student</button>
      <button id="btn-goto-teacher">Faglærer</button>
    </div>
    <div class="err" id="err-login"></div>
  </div>
</div>
<div id="v-tlg" class="view">
  <div class="box">
    <h2>Faglærer-tilgang</h2>
    <p>Gir tilgang til hint-oversikt og aktivitetslogg.</p>
    <label class="flabel" for="f-pw">Passord</label>
    <input class="finput" type="password" id="f-pw" placeholder="********">
    <div class="brow">
      <button class="p" id="btn-teacher">Logg inn</button>
      <button id="btn-back">Tilbake</button>
    </div>
    <div class="err" id="err-teacher"></div>
  </div>
</div>
<div id="v-student" class="view">
  <div class="ph">
    <div><h2>Hint-oversikt</h2><small id="s-sub"></small></div>
    <button id="btn-logout-s">Logg ut</button>
  </div>
  <div class="prog"><div class="prog-f" id="prog" style="width:0"></div></div>
  <p class="prog-lbl" id="prog-lbl"></p>
  <div id="hlist"></div>
  <p class="foot" id="s-foot"></p>
</div>
<div id="v-teacher" class="view">
  <div class="ph">
    <h2>Faglærer-oversikt</h2>
    <div class="brow">
      <button id="btn-refresh">Oppdater</button>
      <button id="btn-logout-t">Logg ut</button>
    </div>
  </div>
  <div class="stats" id="t-stats"><div class="stat"><div class="slbl2">Laster...</div></div></div>
  <div class="tabs">
    <button class="tab on" id="tab-mx">Hint-matrise</button>
    <button class="tab" id="tab-lg">Aktivitetslogg</button>
  </div>
  <div id="t-mx"><p class="empty">Henter data...</p></div>
  <div id="t-lg" style="display:none"><p class="empty">Henter data...</p></div>
  <p class="foot" id="t-foot"></p>
</div>
</main>
<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxtdNHtGzektgDIoiVmnrf96W0_Z61jVKMdvwtcpkis1NXLA6BvhPKjof0yWZG4wvbsQ/exec';
var TPW = 'infraitsec2024';
var HINTS = [{"id": 1, "cat": "Nettverkssikkerhet", "title": "Tilgangskontroll p\u00e5 administrasjonsnettet", "explain": "Unders\u00f8k NSG-reglene p\u00e5 management-subnettet i hub resource group. Se spesielt p\u00e5 inng\u00e5ende regler og hvilke kilder som har tilgang til administrasjonstjenester. Er tilgangen begrenset til n\u00f8dvendige IP-adresser, eller er den bredere enn den burde v\u00e6re?\n\nNavigasjon: Azure Portal \u2192 NSG \u2192 Inbound security rules", "script": "PREFIX=\"<ditt-prefiks>\"\nRG_HUB=\"${PREFIX}-rg-infraitsec-hub\"\nNSG=\"${PREFIX}-nsg-management\"\n\necho \"--- Sjekker NSG-regler paa management-subnet ---\"\naz network nsg rule list \\\n  --resource-group $RG_HUB \\\n  --nsg-name $NSG \\\n  --query \"[].{Navn:name, Prioritet:priority, Kilde:sourceAddressPrefix, Port:destinationPortRange}\" \\\n  --output table\n\nRISKY=$(az network nsg rule list \\\n  --resource-group $RG_HUB \\\n  --nsg-name $NSG \\\n  --query \"[?sourceAddressPrefix=='*' || sourceAddressPrefix=='0.0.0.0/0'].name\" \\\n  --output tsv)\n\necho \"\"\nif [ -z \"$RISKY\" ]; then\n  echo -e \"\\033[0;32mOK:   Ingen NSG-regler er aapne mot 0.0.0.0/0\\033[0m\"\nelse\n  echo -e \"\\033[0;31mFUNN: Foelgende regler tillater trafikk fra hele internett: $RISKY\\033[0m\"\n  echo \"\"\n  echo \"Utbedring:\"\n  echo \"  Endre SourceAddressPrefix fra * til et spesifikt\"\n  echo \"  IP-adresserom, f.eks. NTNU-nettet: 129.241.0.0/16\"\nfi"}, {"id": 2, "cat": "Nettverkssikkerhet", "title": "Nettverksbegrensning p\u00e5 administrasjonsserver", "explain": "Jumpbox-VM-en i hub resource group er tilgjengelig fra internett via public IP. Dette er ikke n\u00f8dvendigvis feil i seg selv, men tilgangen m\u00e5 begrenses til kjente og godkjente n\u00e6tverk. Sjekk om det finnes en NSG-regel p\u00e5 VM-ens NIC som begrenser SSH-tilgang til NTNUs IP-adresserom.\n\nNTNUs nettverk: 129.241.0.0/16\n\nNavigasjon: Azure Portal \u2192 VM \u2192 Networking \u2192 Network Interface \u2192 NSG", "script": "PREFIX=\"<ditt-prefiks>\"\nRG_HUB=\"${PREFIX}-rg-infraitsec-hub\"\nVM=\"${PREFIX}-vm-jumpbox\"\n\necho \"--- Sjekker SSH-tilgang paa jumpbox NIC ---\"\n\nNIC_ID=$(az vm show \\\n  --resource-group $RG_HUB \\\n  --name $VM \\\n  --query \"networkProfile.networkInterfaces[0].id\" \\\n  --output tsv)\n\nNIC_NSG=$(az network nic show \\\n  --ids $NIC_ID \\\n  --query \"networkSecurityGroup.id\" \\\n  --output tsv)\n\nif [ -z \"$NIC_NSG\" ] || [ \"$NIC_NSG\" = \"null\" ]; then\n  echo -e \"\\033[0;31mFUNN: Jumpbox NIC har ingen NSG tilknyttet\\033[0m\"\n  echo \"\"\n  echo \"Utbedring:\"\n  echo \"  Opprett en NSG og knytt den til NIC-en paa jumpbox-VM-en\"\n  echo \"  Legg til en inngaaende regel som tillater SSH (port 22)\"\n  echo \"  kun fra NTNU-nettverket: 129.241.0.0/16\"\nelse\n  NSG_NAME=$(echo $NIC_NSG | rev | cut -d'/' -f1 | rev)\n  RG_NSG=$(echo $NIC_NSG | cut -d'/' -f5)\n\n  NTNU_RULE=$(az network nsg rule list \\\n    --resource-group $RG_NSG \\\n    --nsg-name $NSG_NAME \\\n    --query \"[?destinationPortRange=='22' && sourceAddressPrefix=='129.241.0.0/16' && access=='Allow'].name\" \\\n    --output tsv)\n\n  OPEN_RULE=$(az network nsg rule list \\\n    --resource-group $RG_NSG \\\n    --nsg-name $NSG_NAME \\\n    --query \"[?destinationPortRange=='22' && (sourceAddressPrefix=='*' || sourceAddressPrefix=='0.0.0.0/0') && access=='Allow'].name\" \\\n    --output tsv)\n\n  echo \"\"\n  if [ -n \"$NTNU_RULE\" ] && [ -z \"$OPEN_RULE\" ]; then\n    echo -e \"\\033[0;32mOK:   SSH-tilgang er begrenset til NTNU-nettverket (129.241.0.0/16)\\033[0m\"\n  elif [ -n \"$OPEN_RULE\" ]; then\n    echo -e \"\\033[0;31mFUNN: SSH er fortsatt aapent mot internett (0.0.0.0/0)\\033[0m\"\n    echo \"\"\n    echo \"Utbedring:\"\n    echo \"  Endre eller erstatt SSH-regelen slik at\"\n    echo \"  SourceAddressPrefix settes til 129.241.0.0/16\"\n  else\n    echo -e \"\\033[0;31mFUNN: Ingen SSH-regel for NTNU-nettverket er konfigurert\\033[0m\"\n    echo \"\"\n    echo \"Utbedring:\"\n    echo \"  Legg til inngaaende NSG-regel:\"\n    echo \"  Port: 22, Kilde: 129.241.0.0/16, Aksjon: Allow\"\n  fi\nfi"}, {"id": 3, "cat": "Nettverkssikkerhet", "title": "Videresendt trafikk mellom nettverkssegmenter", "explain": "Unders\u00f8k peering-konfigurasjonen mellom hub og spoke-ene. Innstillingen AllowForwardedTraffic bestemmer om trafikk som er videresendt fra en annen kilde kan passere gjennom peeringen. N\u00e5r denne er aktivert kan trafikk fra ett spoke-nettverk potensielt n\u00e5 et annet via hub-en uten tiltenkt kontroll.\n\nNavigasjon: Azure Portal \u2192 VNET \u2192 Peerings", "script": "PREFIX=\"<ditt-prefiks>\"\nRG_HUB=\"${PREFIX}-rg-infraitsec-hub\"\nHUB_VNET=\"${PREFIX}-vnet-hub\"\n\necho \"--- Sjekker AllowForwardedTraffic paa hub-peeringer ---\"\naz network vnet peering list \\\n  --resource-group $RG_HUB \\\n  --vnet-name $HUB_VNET \\\n  --query \"[].{Navn:name, AllowForwardedTraffic:allowForwardedTraffic, Status:peeringState}\" \\\n  --output table\n\necho \"\"\nOPEN=$(az network vnet peering list \\\n  --resource-group $RG_HUB \\\n  --vnet-name $HUB_VNET \\\n  --query \"[?allowForwardedTraffic==\\`true\\`].name\" \\\n  --output tsv)\n\nif [ -z \"$OPEN\" ]; then\n  echo -e \"\\033[0;32mOK:   AllowForwardedTraffic er deaktivert paa alle hub-peeringer\\033[0m\"\nelse\n  echo -e \"\\033[0;31mFUNN: Foelgende peeringer har AllowForwardedTraffic aktivert: $OPEN\\033[0m\"\n  echo \"\"\n  echo \"Utbedring:\"\n  echo \"  Azure Portal: VNET -> Peerings -> velg peering\"\n  echo \"  Deaktiver 'Allow forwarded traffic' og lagre\"\n  echo \"  Gjenta for alle peeringer som viser true ovenfor\"\nfi"}, {"id": 4, "cat": "Identitet og tilgang", "title": "Autentisering p\u00e5 kundeportalen", "explain": "Unders\u00f8k App Service i frontend resource group. En kundeportal b\u00f8r kreve at brukere autentiserer seg f\u00f8r de f\u00e5r tilgang til innhold. Sjekk om det er konfigurert noen autentiseringsmekanisme p\u00e5 App Service-en.\n\nNavigasjon: Azure Portal \u2192 App Service \u2192 Settings \u2192 Authentication", "script": "PREFIX=\"<ditt-prefiks>\"\nRG_FRONTEND=\"${PREFIX}-rg-infraitsec-frontend\"\nAPP=\"${PREFIX}-app-infraitsec\"\n\necho \"--- Sjekker autentisering paa App Service ---\"\nAUTH=$(az webapp auth show \\\n  --resource-group $RG_FRONTEND \\\n  --name $APP \\\n  --query \"enabled\" \\\n  --output tsv)\n\necho \"\"\nif [ \"$AUTH\" = \"true\" ]; then\n  echo -e \"\\033[0;32mOK:   Entra ID-autentisering er aktivert paa App Service\\033[0m\"\nelse\n  echo -e \"\\033[0;31mFUNN: Ingen autentisering er konfigurert paa App Service\\033[0m\"\n  echo \"      Kundeportalen er tilgjengelig for alle uten innlogging\"\n  echo \"\"\n  echo \"Utbedring:\"\n  echo \"  App Service -> Authentication -> Add identity provider\"\n  echo \"  Velg Microsoft og konfigurer Entra ID-autentisering\"\nfi"}, {"id": 5, "cat": "Identitet og tilgang", "title": "Tilgangsstyring for hemmelighetslageret", "explain": "Unders\u00f8k Key Vault i backend resource group. Key Vault inneholder sensitive hemmeligheter som databasepassord og API-n\u00f8kler. Sjekk hvem som har tilgang til \u00e5 lese hemmelighetene \u2014 b\u00f8r alle brukere i organisasjonen ha denne tilgangen?\n\nNavigasjon: Azure Portal \u2192 Key Vault \u2192 Access policies", "script": "PREFIX=\"<ditt-prefiks>\"\nRG_BACKEND=\"${PREFIX}-rg-infraitsec-backend\"\nKV=\"${PREFIX}-kv-infraitsec\"\n\necho \"--- Sjekker Key Vault access policies ---\"\naz keyvault show \\\n  --name $KV \\\n  --resource-group $RG_BACKEND \\\n  --query \"properties.accessPolicies[].{Principal:objectId, Secrets:permissions.secrets}\" \\\n  --output table\n\nBROAD=$(az keyvault show \\\n  --name $KV \\\n  --resource-group $RG_BACKEND \\\n  --query \"length(properties.accessPolicies[?contains(permissions.secrets, 'get') && contains(permissions.secrets, 'list')])\" \\\n  --output tsv)\n\necho \"\"\nif [ \"$BROAD\" -gt \"1\" ]; then\n  echo -e \"\\033[0;31mFUNN: $BROAD principals har Get+List tilgang til hemmeligheter\\033[0m\"\n  echo \"\"\n  echo \"Utbedring:\"\n  echo \"  Fjern access policies som ikke er strengt nodvendige\"\n  echo \"  Kun tjenester som faktisk trenger hemmelighetene\"\n  echo \"  bor ha tilgang\"\nelse\n  echo -e \"\\033[0;32mOK:   Kun nodvendige principals har tilgang til hemmeligheter\\033[0m\"\nfi"}, {"id": 6, "cat": "Identitet og tilgang", "title": "Autentiseringsmetode for lagringstjenesten", "explain": "Unders\u00f8k Storage Account i backend resource group. Azure Storage st\u00f8tter to autentiseringsmetoder: konton\u00f8kler (full tilgang uten rollestyring) og Managed Identity (identitetsbasert tilgang). Sjekk hvilken metode som er aktivert og konfigurert.\n\nNavigasjon: Azure Portal \u2192 Storage Account \u2192 Configuration", "script": "PREFIX=\"<ditt-prefiks>\"\nRG_BACKEND=\"${PREFIX}-rg-infraitsec-backend\"\nSTORAGE=\"${PREFIX}stginfraisec\"\n\necho \"--- Sjekker autentiseringsmetode paa Storage Account ---\"\nKEY_ACCESS=$(az storage account show \\\n  --name $STORAGE \\\n  --resource-group $RG_BACKEND \\\n  --query \"allowSharedKeyAccess\" \\\n  --output tsv)\n\necho \"\"\nif [ \"$KEY_ACCESS\" = \"false\" ]; then\n  echo -e \"\\033[0;32mOK:   Shared key access er deaktivert\\033[0m\"\n  echo \"      Storage Account krever Managed Identity eller Entra ID\"\nelse\n  echo -e \"\\033[0;31mFUNN: Shared key access er aktivert paa $STORAGE\\033[0m\"\n  echo \"      Kontonokler gir full tilgang uten rollestyring\"\n  echo \"\"\n  echo \"Utbedring:\"\n  echo \"  Storage Account -> Configuration\"\n  echo \"  Sett 'Allow storage account key access' til Disabled\"\nfi"}, {"id": 7, "cat": "Ressurskonfigurasjon", "title": "Offentlig tilgang til interne dokumenter", "explain": "Unders\u00f8k Blob Storage i backend resource group. Sjekk tilgangsinnstillingene p\u00e5 containeren interne-dokumenter. Kan hvem som helst med URL-en laste ned filene? Pr\u00f8v \u00e5 \u00e5pne en blob-URL direkte i nettleseren uten \u00e5 autentisere deg.\n\nNavigasjon: Azure Portal \u2192 Storage Account \u2192 Containers \u2192 interne-dokumenter", "script": "PREFIX=\"<ditt-prefiks>\"\nRG_BACKEND=\"${PREFIX}-rg-infraitsec-backend\"\nSTORAGE=\"${PREFIX}stginfraisec\"\n\necho \"--- Sjekker public access paa blob container ---\"\nACCOUNT_PUBLIC=$(az storage account show \\\n  --name $STORAGE \\\n  --resource-group $RG_BACKEND \\\n  --query \"allowBlobPublicAccess\" \\\n  --output tsv)\n\necho \"\"\nif [ \"$ACCOUNT_PUBLIC\" = \"false\" ]; then\n  echo -e \"\\033[0;32mOK:   Public blob access er deaktivert paa Storage Account-nivaa\\033[0m\"\nelse\n  echo -e \"\\033[0;31mFUNN: Public blob access er aktivert paa $STORAGE\\033[0m\"\n  echo \"      Interne dokumenter er tilgjengelige for alle via URL\"\n  echo \"\"\n  echo \"Test URL:\"\n  echo \"  https://${STORAGE}.blob.core.windows.net/interne-dokumenter/ansattliste-2024.txt\"\n  echo \"\"\n  echo \"Utbedring:\"\n  echo \"  Storage Account -> Configuration\"\n  echo \"  Sett 'Allow Blob anonymous access' til Disabled\"\nfi"}, {"id": 8, "cat": "Ressurskonfigurasjon", "title": "Nettverkstilgang til databaseserver", "explain": "Unders\u00f8k Azure SQL Server i backend resource group. En databaseserver b\u00f8r ha strengt begrensede nettverksregler som kun tillater tilgang fra kjente og n\u00f8dvendige kilder. Sjekk brannmurreglene p\u00e5 SQL-serveren.\n\nNavigasjon: Azure Portal \u2192 SQL Server \u2192 Networking \u2192 Firewall rules", "script": "PREFIX=\"<ditt-prefiks>\"\nRG_BACKEND=\"${PREFIX}-rg-infraitsec-backend\"\nSQL=\"${PREFIX}-sql-infraitsec\"\n\necho \"--- Sjekker SQL Server brannmurregler ---\"\naz sql server firewall-rule list \\\n  --resource-group $RG_BACKEND \\\n  --server $SQL \\\n  --query \"[].{Navn:name, Fra:startIpAddress, Til:endIpAddress}\" \\\n  --output table\n\nOPEN_RULE=$(az sql server firewall-rule list \\\n  --resource-group $RG_BACKEND \\\n  --server $SQL \\\n  --query \"[?endIpAddress=='255.255.255.255'].name\" \\\n  --output tsv)\n\necho \"\"\nif [ -n \"$OPEN_RULE\" ]; then\n  echo -e \"\\033[0;31mFUNN: Brannmurregel '$OPEN_RULE' tillater alle IP-adresser\\033[0m\"\n  echo \"\"\n  echo \"Utbedring:\"\n  echo \"  SQL Server -> Networking -> Firewall rules\"\n  echo \"  Slett regelen som tillater 0.0.0.0-255.255.255.255\"\n  echo \"  Erstatt med spesifikke IP-adresser eller bruk\"\n  echo \"  Private Endpoint for nettverksisolasjon\"\nelse\n  echo -e \"\\033[0;32mOK:   Ingen brannmurregel tillater alle IP-adresser\\033[0m\"\nfi"}];
var CATS = [];
HINTS.forEach(function(h){if(CATS.indexOf(h.cat)===-1)CATS.push(h.cat);});
var currentUser = null;
var useSheets = false;

function safeGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function safeSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function apiUrl(p){return APPS_SCRIPT_URL+'?'+Object.keys(p).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(p[k]);}).join('&');}
function fetchUsage(cb){
  if(!useSheets){cb(safeGet('iits_usage')||{});return;}
  fetch(apiUrl({action:'getUsage'})).then(function(r){return r.json();}).then(function(d){cb(d||{});}).catch(function(){cb(safeGet('iits_usage')||{});});
}
function fetchLog(cb){
  if(!useSheets){cb(safeGet('iits_log')||[]);return;}
  fetch(apiUrl({action:'getLog'})).then(function(r){return r.json();}).then(function(d){cb(Array.isArray(d)?d:[]);}).catch(function(){cb(safeGet('iits_log')||[]);});
}
function saveUsed(user,hintId,level,cb){
  var u=safeGet('iits_usage')||{};
  if(!u[user])u[user]={};
  if(!u[user][hintId])u[user][hintId]={};
  u[user][hintId][level]=true;
  safeSet('iits_usage',u);
  var l=safeGet('iits_log')||[];
  l.push({user:user,hintId:hintId,level:level,ts:new Date().toISOString()});
  safeSet('iits_log',l);
  if(useSheets){fetch(apiUrl({action:'markUsed',user:user,hintId:hintId,level:level})).then(function(){if(cb)cb();}).catch(function(){if(cb)cb();});}
  else{if(cb)cb();}
}
function showV(id){document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});document.getElementById(id).classList.add('active');}
function updateProg(){
  var u=safeGet('iits_usage')||{};
  var c=Object.keys(u[currentUser]||{}).length;
  document.getElementById('prog').style.width=Math.round(c/HINTS.length*100)+'%';
  document.getElementById('prog-lbl').textContent=c+' av '+HINTS.length+' hint \u00e5pnet';
}
function doLoginStudent(){
  var val=document.getElementById('f-prefix').value;
  var prefix=(val||'').trim().toLowerCase();
  if(!prefix||prefix.length<2){document.getElementById('err-login').textContent='Skriv inn et gyldig prefiks.';return;}
  document.getElementById('err-login').textContent='';
  currentUser=prefix;
  document.getElementById('hdr-user').textContent=prefix;
  document.getElementById('s-sub').textContent='Prefiks: '+prefix+' \u2014 8 svakheter \u00e5 finne';
  document.getElementById('s-foot').textContent=useSheets?'Hint-bruk lagres sentralt.':'Hint-bruk lagres lokalt i denne nettleseren.';
  showV('v-student');
  renderStudent();
}
function doLoginTeacher(){
  var pw=document.getElementById('f-pw').value||'';
  if(pw!==TPW){document.getElementById('err-teacher').textContent='Feil passord.';return;}
  document.getElementById('err-teacher').textContent='';
  document.getElementById('hdr-user').textContent='fagl\u00e6rer';
  document.getElementById('t-foot').textContent=useSheets?'Data hentes fra Google Sheets.':'Data lagres per nettleser.';
  showV('v-teacher');
  renderTeacher();
}
function doLogout(){
  currentUser=null;
  document.getElementById('hdr-user').textContent='';
  document.getElementById('f-prefix').value='';
  document.getElementById('f-pw').value='';
  document.getElementById('err-login').textContent='';
  document.getElementById('err-teacher').textContent='';
  showV('v-login');
  setTimeout(function(){document.getElementById('f-prefix').focus();},50);
}
document.getElementById('btn-student').addEventListener('click',doLoginStudent);
document.getElementById('btn-goto-teacher').addEventListener('click',function(){showV('v-tlg');});
document.getElementById('btn-teacher').addEventListener('click',doLoginTeacher);
document.getElementById('btn-back').addEventListener('click',function(){showV('v-login');});
document.getElementById('btn-logout-s').addEventListener('click',doLogout);
document.getElementById('btn-logout-t').addEventListener('click',doLogout);
document.getElementById('btn-refresh').addEventListener('click',renderTeacher);
document.getElementById('tab-mx').addEventListener('click',function(){switchTab('t-mx',this);});
document.getElementById('tab-lg').addEventListener('click',function(){switchTab('t-lg',this);});
document.getElementById('f-prefix').addEventListener('keydown',function(e){if(e.key==='Enter')doLoginStudent();});
document.getElementById('f-pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLoginTeacher();});
useSheets=APPS_SCRIPT_URL!=='';

function renderStudent(){
  var el=document.getElementById('hlist');
  el.innerHTML='<p class="empty">Laster...</p>';
  fetchUsage(function(usage){
    var myU=usage[currentUser]||{};
    updateProg();
    el.innerHTML='';
    CATS.forEach(function(cat){
      var lbl=document.createElement('p');lbl.className='clbl';lbl.textContent=cat;el.appendChild(lbl);
      HINTS.filter(function(h){return h.cat===cat;}).forEach(function(hint){
        var eu=!!(myU[hint.id]&&myU[hint.id].explain);
        var su=!!(myU[hint.id]&&myU[hint.id].script);
        var card=document.createElement('div');card.className='hcard';
        var hdr=document.createElement('div');hdr.className='hhdr';hdr.setAttribute('role','button');hdr.setAttribute('tabindex','0');
        hdr.innerHTML='<span class="hnum">'+hint.id+'</span><span class="htit'+(eu?' used':'')+'" >'+hint.title+'</span><span class="badge '+(eu?'bdone':'bnew')+'">'+(eu?'\u00c5pnet':'Nytt')+'</span>';
        var body=document.createElement('div');body.className='hbody';
        var expEl=document.createElement('div');expEl.className='explain';expEl.textContent=hint.explain;
        var sep=document.createElement('hr');sep.className='sep';
        var slbl=document.createElement('p');slbl.className='slbl';slbl.textContent='Verifiseringsscript \u2014 kj\u00f8res i Azure Cloud Shell etter utbedring:';
        var sw=document.createElement('div');
        if(su){buildScript(sw,hint);}
        else{
          var cbox=document.createElement('div');cbox.className='cbox';
          cbox.innerHTML='<p>Scriptet sjekker om svakheten er utbedret korrekt og skriver ut gr\u00f8nn OK eller r\u00f8d FUNN. \u00c5pner du det registreres dette som brukt hint.</p><div class="brow"><button class="bwarn">Vis verifiseringsscript</button><button>Avbryt</button></div>';
          cbox.querySelectorAll('button')[0].addEventListener('click',function(){saveUsed(currentUser,hint.id,'script',function(){buildScript(sw,hint);cbox.remove();updateProg();});});
          cbox.querySelectorAll('button')[1].addEventListener('click',function(){cbox.remove();});
          sw.appendChild(cbox);
        }
        body.appendChild(expEl);body.appendChild(sep);body.appendChild(slbl);body.appendChild(sw);
        card.appendChild(hdr);card.appendChild(body);el.appendChild(card);
        function toggleBody(){
          var open=body.style.display==='block';
          body.style.display=open?'none':'block';
          if(!open&&!eu){
            eu=true;
            saveUsed(currentUser,hint.id,'explain',function(){
              hdr.querySelector('.badge').className='badge bdone';
              hdr.querySelector('.badge').textContent='\u00c5pnet';
              hdr.querySelector('.htit').classList.add('used');
              updateProg();
            });
          }
        }
        hdr.addEventListener('click',toggleBody);
        hdr.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleBody();}});
      });
    });
  });
}
function buildScript(container,hint){
  container.innerHTML='';
  var box=document.createElement('div');box.className='sbox';
  var shdr=document.createElement('div');shdr.className='shdr';
  var lbl=document.createElement('span');lbl.textContent='Bash \u2014 Azure Cloud Shell';
  var cpBtn=document.createElement('button');cpBtn.className='cpbtn';cpBtn.textContent='Kopier';
  cpBtn.addEventListener('click',function(e){
    e.stopPropagation();
    if(navigator.clipboard){navigator.clipboard.writeText(hint.script).then(function(){cpBtn.textContent='Kopiert!';setTimeout(function(){cpBtn.textContent='Kopier';},1500);}).catch(function(){cpBtn.textContent='Feil';});}
    else{var ta=document.createElement('textarea');ta.value=hint.script;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);cpBtn.textContent='Kopiert!';setTimeout(function(){cpBtn.textContent='Kopier';},1500);}
  });
  shdr.appendChild(lbl);shdr.appendChild(cpBtn);
  var pre=document.createElement('pre');pre.textContent=hint.script;
  box.appendChild(shdr);box.appendChild(pre);container.appendChild(box);
}
function renderTeacher(){
  document.getElementById('t-mx').innerHTML='<p class="empty">Henter data...</p>';
  document.getElementById('t-lg').innerHTML='<p class="empty">Henter data...</p>';
  fetchUsage(function(usage){
    fetchLog(function(log){
      var users=Object.keys(usage).sort();
      var total=users.reduce(function(s,u){return s+Object.keys(usage[u]||{}).length;},0);
      var avg=users.length?(total/users.length).toFixed(1):'0';
      document.getElementById('t-stats').innerHTML=
        '<div class="stat"><div class="slbl2">Studenter</div><div class="sval">'+users.length+'</div></div>'+
        '<div class="stat"><div class="slbl2">Hint \u00e5pnet</div><div class="sval">'+total+'</div></div>'+
        '<div class="stat"><div class="slbl2">Snitt</div><div class="sval">'+avg+'</div></div>';
      var mx=document.getElementById('t-mx');mx.innerHTML='';
      if(!users.length){mx.innerHTML='<p class="empty">Ingen hint brukt enn\u00e5.</p>';}
      else{
        var tbl=document.createElement('div');tbl.className='tbl';
        var hdr=document.createElement('div');hdr.className='trow th';
        hdr.innerHTML='<span>Prefiks</span><span>\u00c5pnet</span>'+HINTS.map(function(h){return '<span style="text-align:center" title="'+h.title+'">'+h.id+'</span>';}).join('');
        tbl.appendChild(hdr);
        users.forEach(function(u){
          var row=document.createElement('div');row.className='trow';
          var ud=usage[u]||{};
          row.innerHTML='<span><strong>'+u+'</strong></span><span>'+Object.keys(ud).length+' / '+HINTS.length+'</span>'+HINTS.map(function(h){return '<span><span class="dot '+(ud[h.id]?'don':'doff')+'"></span></span>';}).join('');
          tbl.appendChild(row);
        });
        mx.appendChild(tbl);
      }
      var lg=document.getElementById('t-lg');lg.innerHTML='';
      var entries=Array.isArray(log)?log:[];
      if(!entries.length){lg.innerHTML='<p class="empty">Ingen aktivitet enn\u00e5.</p>';}
      else{
        var tbl2=document.createElement('div');tbl2.className='tbl';
        entries.slice().reverse().slice(0,50).forEach(function(e){
          var h=HINTS.filter(function(x){return x.id===e.hintId;})[0];
          var row=document.createElement('div');row.className='lrow';
          var ts=new Date(e.ts);
          var t=ts.toLocaleDateString('no-NO')+' '+ts.toLocaleTimeString('no-NO',{hour:'2-digit',minute:'2-digit'});
          var type=e.level==='script'?'script':'forklaring';
          row.innerHTML='<span><strong>'+e.user+'</strong> \u00e5pnet '+type+' \u2014 hint '+e.hintId+': '+(h?h.title:'')+'</span><span class="ltime">'+t+'</span>';
          tbl2.appendChild(row);
        });
        lg.appendChild(tbl2);
      }
    });
  });
}
function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('t-mx').style.display=id==='t-mx'?'block':'none';
  document.getElementById('t-lg').style.display=id==='t-lg'?'block':'none';
}
</script>
</body>
</html>
